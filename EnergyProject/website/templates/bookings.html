{% extends "base.html" %}
{% block content %}

<h1 class="titleText">Your Bookings</h1>

{% if bookings %}
<div class="tableWrapper">
    <table class="bookingTable">
        <thead>
            <tr>
                <th>Date</th>
                <th>Booking Type</th>
            </tr>
        </thead>
        <tbody>
        {% for b in bookings %}
            <tr>
                <td>{{ b['date'] }}</td>
                <td>{{ b['bookingType'] }}</td>
            </tr>
        {% endfor %}
        </tbody>
    </table>
</div>
{% else %}
    <p class="containerText emptyState">No bookings yet.</p>
{% endif %}

{% endblock %}
